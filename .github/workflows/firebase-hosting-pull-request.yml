name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: yarn install --frozen-lockfile
      - run: yarn build
        env:
          VITE_GOONG_API_KEY: ${{ secrets.VITE_GOONG_API_KEY }}
          VITE_GHN_TOKEN: ${{ secrets.VITE_GHN_TOKEN }}
          VITE_GHN_SHOP_ID: ${{ secrets.VITE_GHN_SHOP_ID }}
          VITE_GHTK_TOKEN: ${{ secrets.VITE_GHTK_TOKEN }}
          VITE_AHAMOVE_TOKEN: ${{ secrets.VITE_AHAMOVE_TOKEN }}
          VITE_LALAMOVE_API_KEY: ${{ secrets.VITE_LALAMOVE_API_KEY }}
          VITE_LALAMOVE_API_SECRET: ${{ secrets.VITE_LALAMOVE_API_SECRET }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NBH_SHIPPING_FEE }}
          projectId: nbh-shipping-fee
